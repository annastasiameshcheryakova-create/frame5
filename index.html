<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Сонячна система (Pepsi AR)</title>

    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
</head>

<body style="margin: 0; overflow: hidden;">
    <script src="SS.js"></script>

    <a-scene 
        mindar-image="imageTargetSrc:targets.mind;" 
        vr-mode-ui="enabled: false" 
        device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <img id="sun-tex" src="2k_sun.jpg">
            <img id="mercury-tex" src="2k_mercury.jpg">
            <img id="venus-tex" src="2k_venus_surface.jpg">
            <img id="earth-tex" src="2k_earth_daymap.jpg">
            <img id="mars-tex" src="2k_mars.jpg">
            <img id="uranus-tex" src="2k_uranus.jpg">
            <img id="jupiter-tex" src="2k_jupiter.jpg">
            <img id="neptune-tex" src="preview_neptune.jpg">
            <img id="saturn-tex" src="2k_saturn.jpg">
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0">
            <a-box scale="0.1 0.1 0.1" color="red"></a-box>

            <a-entity scale="0.01 0.01 0.01" rotation="0 0 0">
                <a-sphere radius="20.510" src="#sun-tex" planet="dist: 0; mass: 1.989e30; name: Sun"></a-sphere>
                <a-entity geometry="primitive: sphere; radius: 2.4397" material="src:#mercury-tex" planet="dist: 57.91e9; mass: 3.3011e23; T: 87.9691; name: Mercury"></a-entity>
                <a-entity geometry="primitive: sphere; radius: 6.0518" material="src:#venus-tex" planet="dist: 108.2e9; mass: 4.876e24; T: 224.7; name: Venus"></a-entity>
                <a-entity geometry="primitive: sphere; radius: 6.371" material="src:#earth-tex" planet="dist: 149.6e9; mass: 6e24; T: 365; name: Earth"></a-entity>
                <a-sphere radius="3.3895" material="src:#mars-tex" planet="dist: 227.939366e9; mass: 6.4171e23; T: 686.980; name: Mars"></a-sphere>
                <a-sphere radius="15" material="src:#jupiter-tex" planet="dist: 310.5e9; mass: 1e20; T: 1325.88; name: Jupiter"></a-sphere>
                <a-sphere radius="12" material="src:#saturn-tex" planet="dist: 420.5e9; mass: 4e25; T: 2050.22; name: Saturn"></a-sphere>
                <a-sphere radius="8" material="src:#uranus-tex" planet="dist: 600.5e9; mass: 7e20; T: 3000.15; name: Uranus"></a-sphere>
                <a-sphere radius="8" material="src:#neptune-tex" planet="dist: 700.1e9; mass: 1e20; T: 5000.03; name: Neptune"></a-sphere>
            </a-entity>
        </a-entity>
        
        <a-entity main></a-entity>
    </a-scene>
</body>
</html>
